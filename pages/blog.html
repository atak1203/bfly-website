<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — BFL'Y SUAS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/blog.css" />
</head>
<body
  data-page-hero="true"
  data-hero-eyebrow-en="News & Updates"
  data-hero-eyebrow-tr="Haberler & Güncellemeler"
  data-hero-title-en="Blog"
  data-hero-title-tr="Blog"
  data-hero-accent="Blog"
  data-hero-desc-en="Updates from the field — flights, builds, competitions, and everything in between."
  data-hero-desc-tr="Sahadan güncellemeler — uçuşlar, üretim, yarışmalar ve aradaki her şey."
>

  <!-- Navbar, page-hero & footer → components.js tarafından inject edilir -->

  <!-- ===================== CATEGORY BAR ===================== -->
  <div class="category-bar-wrap">
    <div class="container">
      <div class="category-bar" id="category-bar"></div>
    </div>
  </div>

  <!-- ===================== BLOG BODY ===================== -->
  <main class="blog-body">
    <div class="container">

      <!-- FEATURED ROW -->
      <div class="featured-row" id="featured-row"></div>

      <!-- MORE POSTS -->
      <div class="section-divider">
        <span id="divider-label"></span>
      </div>
      <div class="posts-grid" id="posts-grid"></div>

      <!-- NO RESULTS -->
      <div class="no-results" id="no-results" style="display:none; flex-direction:column; align-items:center;">
        <span class="no-results-icon">📭</span>
        <p></p>
      </div>

    </div>
  </main>

  <script src="../js/components.js"></script>
  <script src="../js/blog.js"></script>
</body>
</html>
