<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BFL'Y — Gallery" />
  <title>Gallery | BFL'Y</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/gallery.css" />
</head>
<body
  data-page-hero="true"
  data-hero-eyebrow-en="Visual Archive"
  data-hero-eyebrow-tr="Görsel Arşiv"
  data-hero-title-en="Gallery"
  data-hero-title-tr="Galeri"
  data-hero-accent="Gallery"
  data-hero-desc-en="Photos from our build process, test flights, and competition days."
  data-hero-desc-tr="Üretim sürecimizden, test uçuşlarından ve yarışma günlerinden kareler."
>

  <!-- Navbar, page-hero & footer → components.js tarafından inject edilir -->

  <!-- ===== GALLERY SECTION ===== -->
  <main class="gallery-section" aria-label="Photo gallery">
    <div class="container">

      <!-- Filter pills -->
      <div class="gallery-filters" id="gallery-filters" role="group" aria-label="Filter by category"></div>

      <!-- Grid (JS tarafından doldurulur) -->
      <div class="gallery-grid" id="galleryGrid"></div>

    </div>
  </main>

  <!-- ===== LIGHTBOX ===== -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">&#x2715;</button>
    <button class="lightbox-prev"  id="lightboxPrev"  aria-label="Previous image">&#x2039;</button>
    <button class="lightbox-next"  id="lightboxNext"  aria-label="Next image">&#x203A;</button>
    <div class="lightbox-inner">
      <img id="lightboxImg" src="" alt="" />
      <p class="lightbox-caption" id="lightboxCaption"></p>
    </div>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/gallery.js"></script>
</body>
</html>
